# Release 工作流 - 构建并发布 CCAR Copilot
# 暂时仅手动触发，避免推送 tag 后自动在 GitHub 上构建

name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: '发布版本号，例如 0.1.10'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  # ============================================
  # 创建 Release
  # ============================================
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create_release.outputs.id }}
      version: ${{ steps.get_version.outputs.VERSION }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: get_version
        shell: bash
        run: |
          VERSION="${{ inputs.version }}"
          VERSION="${VERSION#v}"
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.VERSION }}
          name: CCAR Copilot v${{ steps.get_version.outputs.VERSION }}
          draft: true
          prerelease: false
          body: |
            ## CCAR Copilot v${{ steps.get_version.outputs.VERSION }}

            民航规章检索与同步工具

            ### 功能特性

            | 功能 | 说明 |
            |------|------|
            | 规章全文搜索 | Tantivy + jieba 中文分词，支持离线检索 |
            | 在线规章同步 | 自动下载 CAAC 民航规章、规范性文件、标准规范 |
            | OCR 识别 | OpenVINO + PP-OCRv4 高精度中英文识别 |
            | PDF 文本提取 | 基于 Google PDFium 引擎 |
            | 多语言界面 | 中文 / English |

            ### 下载

            | 文件 | 说明 |
            |------|------|
            | `CCAR.Copilot_*.msi` | Windows MSI 安装包 |
            | `CCAR.Copilot_*.exe` | Windows NSIS 安装包 |
          generate_release_notes: true

  # ============================================
  # Windows 构建
  # ============================================
  build-windows:
    name: Build Windows
    needs: create-release
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}

  # ============================================
  # 发布 Release
  # ============================================
  publish-release:
    name: Publish Release
    needs: [create-release, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish release
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false
            })
